<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagnoAI - Breast Cancer Prediction</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #3498db;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        button {
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            background: #f8f9fa;
            border-left: 5px solid #3498db;
        }
        .prediction {
            font-size: 1.5em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .probability {
            font-size: 1.2em;
            color: #7f8c8d;
        }
        .explanation {
            margin-top: 20px;
        }
        .explanation h3 {
            color: #34495e;
            margin-bottom: 15px;
        }
        .feature-list {
            list-style: none;
            padding: 0;
        }
        .feature-item {
            background: white;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #e74c3c;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .feature-name {
            font-weight: bold;
            color: #2c3e50;
        }
        .feature-impact {
            color: #7f8c8d;
            font-size: 0.9em;
        }
        .loading {
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 DiagnoAI - Breast Cancer Prediction</h1>
        <p style="text-align: center; color: #7f8c8d; margin-bottom: 30px;">
            Enter patient data below to get AI-powered disease prediction with explanations
        </p>
        
        <form id="predictionForm">
            <div class="grid">
                {% for feature in features %}
                <div class="form-group">
                    <label for="{{ feature }}">{{ feature.replace('_', ' ').title() }}</label>
                    <input type="number" id="{{ feature }}" name="{{ feature }}" 
                           step="0.001" placeholder="Enter value" required>
                </div>
                {% endfor %}
            </div>
            <button type="submit">🔍 Predict Disease Risk</button>
        </form>
        
        <div id="result" class="result" style="display: none;">
            <div class="prediction" id="prediction"></div>
            <div class="probability" id="probability"></div>
            <div class="explanation" id="explanation"></div>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="loading">🔄 Analyzing patient data...</div>';
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.error) {
                    resultDiv.innerHTML = `<div style="color: #e74c3c;">❌ Error: ${result.error}</div>`;
                    return;
                }
                
                // Display prediction
                const predictionColor = result.prediction.includes('Positive') ? '#e74c3c' : '#27ae60';
                resultDiv.innerHTML = `
                    <div class="prediction" style="color: ${predictionColor}">
                        ${result.prediction}
                    </div>
                    <div class="probability">
                        Risk Probability: ${(result.probability * 100).toFixed(1)}%
                    </div>
                    <div class="explanation">
                        <h3>🔍 LIME Explanation - Feature Importance:</h3>
                        <ul class="feature-list">
                            ${result.lime_explanation.map(item => `
                                <li class="feature-item">
                                    <div class="feature-name">${item[0]}</div>
                                    <div class="feature-impact">Impact: ${item[1].toFixed(4)}</div>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `<div style="color: #e74c3c;">❌ Error: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
